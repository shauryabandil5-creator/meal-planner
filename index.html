<!DOCTYPE html>
<html>
<head>
  <title>Veg Meal Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🥗 Veg Meal Planner</h1>

  <div class="container">

<h3>🥣 Breakfast Foods</h3>

<label><input type="checkbox" class="food" value="Poha" checked> Poha</label><br>
<label><input type="checkbox" class="food" value="Idli" checked> Idli</label><br>
<label><input type="checkbox" class="food" value="Dosa" checked> Dosa</label><br>
<label><input type="checkbox" class="food" value="Upma" checked> Upma</label><br>

<h3>🍛 Lunch Foods</h3>

<label><input type="checkbox" class="food" value="Dal Chawal" checked> Dal Chawal</label><br>
<label><input type="checkbox" class="food" value="Rajma Chawal" checked> Rajma Chawal</label><br>
<label><input type="checkbox" class="food" value="Chole" checked> Chole</label><br>
<label><input type="checkbox" class="food" value="Roti Sabzi" checked> Roti Sabzi</label><br>

<h3>🍲 Dinner Foods</h3>

<label><input type="checkbox" class="food" value="Khichdi" checked> Khichdi</label><br>
<label><input type="checkbox" class="food" value="Palak Paneer" checked> Palak Paneer</label><br>
<label><input type="checkbox" class="food" value="Vegetable Curry" checked> Vegetable Curry</label><br>
<label><input type="checkbox" class="food" value="Soybean Curry" checked> Soybean Curry</label><br>
    <label>Age:</label>
<input type="number" id="age" placeholder="18">

<label>Height (cm):</label>
<input type="number" id="height" placeholder="175">

<label>Weight (kg):</label>
<input type="number" id="weight" placeholder="63">

    <label>Goal:</label>
    <select id="goal">
      <option value="loss">Weight Loss</option>
      <option value="gain">Weight Gain</option>
      <option value="maintain">Maintain</option>
    </select>
    <label>Activity Level:</label>

<select id="activity">
  <option value="sedentary">Sedentary</option>
  <option value="moderate">Moderate</option>
  <option value="gym">Gym (3-5 days)</option>
  <option value="athlete">Gym (6+ days)</option>
</select>

    <button onclick="generateMeal()">Generate Weekly Plan</button>

    <div id="result"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
